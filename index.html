<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Studio Francisca Rodrigues</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h1{
text-align:center;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:900px;
margin:auto;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#8e44ad;
color:white;
border:none;
border-radius:5px;
margin-top:5px;
}

.hidden{
display:none;
}

.item{
border-bottom:1px solid #ddd;
padding:10px;
}

.total{
font-size:22px;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<h1>Studio Francisca Rodrigues</h1>

<div class="container" id="login">

<h3>Login</h3>

<input id="usuario" placeholder="Usuário">
<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

<!-- PAINEL PROFISSIONAIS -->

<div id="painelProfissional" class="hidden">

<div class="container">

<h3>Registrar Atendimento</h3>

<input id="cliente" placeholder="Cliente">

<select id="profissional"></select>

<select id="servico"></select>

<input type="date" id="data">

<input type="time" id="hora">

<input id="valor" type="number" placeholder="Valor">

<select id="pagamento">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<button onclick="registrar()">Registrar</button>

</div>

</div>


<!-- PAINEL ADMIN -->

<div id="painelAdmin" class="hidden">

<div class="container">

<h3>Cadastrar Profissional</h3>

<input id="novaProfissional" placeholder="Nome">
<input id="comissao" type="number" placeholder="Comissão %">

<button onclick="addProfissional()">Cadastrar</button>

<div id="listaProfissionais"></div>

</div>


<div class="container">

<h3>Cadastrar Serviço</h3>

<input id="novoServico" placeholder="Serviço">
<input id="valorServico" type="number" placeholder="Valor">

<button onclick="addServico()">Cadastrar</button>

<div id="listaServicos"></div>

</div>


<div class="container">

<h3>Movimentação do Caixa</h3>

<div id="lista"></div>

<div class="total">
Total Caixa: R$ <span id="total">0</span>
</div>

<div class="total">
Total Comissão: R$ <span id="comissaoTotal">0</span>
</div>

<button onclick="fecharCaixa()">Fechar Caixa</button>

</div>

</div>


<script>

let profissionais=JSON.parse(localStorage.getItem("profissionais"))||[]
let servicos=JSON.parse(localStorage.getItem("servicos"))||[]
let atendimentos=JSON.parse(localStorage.getItem("atendimentos"))||[]

function login(){

let u=document.getElementById("usuario").value
let s=document.getElementById("senha").value

if(u==="admin" && s==="1234"){

document.getElementById("login").classList.add("hidden")
document.getElementById("painelAdmin").classList.remove("hidden")

carregar()

}

else if(u==="profissional" && s==="1234"){

document.getElementById("login").classList.add("hidden")
document.getElementById("painelProfissional").classList.remove("hidden")

carregar()

}

else{

alert("Login inválido")

}

}

function carregar(){

let p=document.getElementById("profissional")
let s=document.getElementById("servico")

if(p && s){

p.innerHTML=""
s.innerHTML=""

profissionais.forEach(pr=>{

p.innerHTML+=`<option>${pr.nome}</option>`

})

servicos.forEach(se=>{

s.innerHTML+=`<option value="${se.valor}">${se.nome}</option>`

})

}

listarCadastros()
mostrar()

}

function addProfissional(){

let nome=document.getElementById("novaProfissional").value
let comissao=document.getElementById("comissao").value

profissionais.push({nome,comissao})

localStorage.setItem("profissionais",JSON.stringify(profissionais))

carregar()

}

function addServico(){

let nome=document.getElementById("novoServico").value
let valor=document.getElementById("valorServico").value

servicos.push({nome,valor})

localStorage.setItem("servicos",JSON.stringify(servicos))

carregar()

}

function listarCadastros(){

let lp=document.getElementById("listaProfissionais")
let ls=document.getElementById("listaServicos")

if(!lp || !ls) return

lp.innerHTML="<b>Profissionais</b>"
ls.innerHTML="<b>Serviços</b>"

profissionais.forEach((p,i)=>{

lp.innerHTML+=`
<div class="item">
${p.nome} (${p.comissao}%)
<button onclick="excluirProfissional(${i})">Excluir</button>
</div>
`

})

servicos.forEach((s,i)=>{

ls.innerHTML+=`
<div class="item">
${s.nome} - R$ ${s.valor}
<button onclick="excluirServico(${i})">Excluir</button>
</div>
`

})

}

function excluirProfissional(i){

profissionais.splice(i,1)

localStorage.setItem("profissionais",JSON.stringify(profissionais))

carregar()

}

function excluirServico(i){

servicos.splice(i,1)

localStorage.setItem("servicos",JSON.stringify(servicos))

carregar()

}

function registrar(){

let cliente=document.getElementById("cliente").value
let profissional=document.getElementById("profissional").value
let servico=document.getElementById("servico").selectedOptions[0].text
let valor=parseFloat(document.getElementById("valor").value)
let pagamento=document.getElementById("pagamento").value
let data=document.getElementById("data").value
let hora=document.getElementById("hora").value

let prof=profissionais.find(p=>p.nome===profissional)

let comissao=(valor*(prof.comissao/100))

let at={cliente,profissional,servico,valor,pagamento,data,hora,comissao}

atendimentos.push(at)

localStorage.setItem("atendimentos",JSON.stringify(atendimentos))

alert("Atendimento registrado")

}

function mostrar(){

let lista=document.getElementById("lista")

if(!lista) return

lista.innerHTML=""

let total=0
let totalComissao=0

atendimentos.forEach(a=>{

total+=a.valor
totalComissao+=a.comissao

lista.innerHTML+=`

<div class="item">

${a.cliente} - ${a.servico}<br>
${a.profissional}<br>
${a.data} ${a.hora}<br>
R$ ${a.valor}

</div>

`

})

document.getElementById("total").innerText=total.toFixed(2)
document.getElementById("comissaoTotal").innerText=totalComissao.toFixed(2)

}

function fecharCaixa(){

if(confirm("Fechar caixa?")){

localStorage.removeItem("atendimentos")

atendimentos=[]

mostrar()

}

}

</script>

</body>
</html>
